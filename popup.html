<!DOCTYPE html>
<html>

<head>
  <link rel="stylesheet" href="popup.css">
  <title>Heatmap Tracker</title>
</head>

<body>
  <div class="container">
    <h2>Heatmap Tracker</h2>

    <!-- AUTH SECTION -->
    <div id="auth-section">
      <input type="email" id="email" placeholder="Enter your email" />
      <input type="password" id="password" placeholder="Enter password" />
      <div style="display: flex; gap: 10px;">
        <button id="login-btn">Login</button>
        <button id="register-btn" style="background: #10b981;">Register</button>
      </div>
      <p id="error-msg"></p>
    </div>

    <!-- STATUS SECTION -->
    <div id="status-section" style="display: none;">
      <div class="badge" id="recording-badge">
        <div class="dot" id="recording-dot"></div>
        <span id="recording-text">Ready to Record</span>
      </div>

      <div class="setting-card">
        <div class="setting-header">
          <div class="setting-info">
            <h4>Mouse Tracking</h4>
            <p>Record cursor movements</p>
          </div>
          <label class="switch">
            <input type="checkbox" id="toggle-mouse" checked>
            <span class="slider"></span>
          </label>
        </div>
      </div>

      <div class="setting-card">
        <div class="setting-header">
          <div class="setting-info">
            <h4>Scroll Tracking</h4>
            <p>Record page scrolling</p>
          </div>
          <label class="switch">
            <input type="checkbox" id="toggle-scroll" checked>
            <span class="slider"></span>
          </label>
        </div>
      </div>

      <div class="setting-card">
        <div class="setting-header">
          <div class="setting-info">
            <h4>Eye Tracking</h4>
            <p>Require webcam permission</p>
          </div>
          <label class="switch">
            <input type="checkbox" id="toggle-eye" checked>
            <span class="slider"></span>
          </label>
        </div>
        <button id="calibrate-btn">Calibrate Gaze</button>
      </div>

      <button id="record-btn" style="margin-top: 10px; margin-bottom: 12px;">Start Recording</button>
      <button id="logout-btn" class="secondary">Logout</button>
    </div>

  </div>
  <script src="popup.js"></script>
</body>

</html>
